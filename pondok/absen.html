<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Absen — Sistem Pondok</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: { extend: {
      fontFamily: { sans: ['Poppins', 'sans-serif'] },
      colors: { hijau: { DEFAULT:'#059669', dark:'#047857', soft:'#d1fae5' }, emas: { DEFAULT:'#D4AF37', soft:'#faf3d9' } }
    }}
  };
</script>
<style>
  body{ background:#f6f7f6; } .dark body{ background:#0b1210; }
  .tab-btn.active{ background:#059669; color:#fff; }
  .fade-in{ animation: fadeIn .25s ease both; } @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  input[type="radio"]{ accent-color:#059669; width:16px; height:16px; }
  .toast{ animation: slideUp .25s ease both; }
  @keyframes slideUp{ from{opacity:0; transform:translate(-50%,10px);} to{opacity:1; transform:translate(-50%,0);} }
</style>
</head>
<body class="min-h-screen font-sans text-slate-800 dark:text-slate-100 pb-16">

<header class="sticky top-0 z-30 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800 px-4 py-3">
  <div class="max-w-4xl mx-auto flex items-center justify-between">
    <a href="index.html" class="text-sm font-semibold text-hijau flex items-center gap-1">← Dashboard</a>
    <button id="darkToggle" class="w-9 h-9 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-sm border border-slate-200 dark:border-slate-700">🌙</button>
  </div>
</header>

<main class="max-w-4xl mx-auto px-4 pt-5">

  <div id="accessDenied" class="hidden text-center py-24 text-sm text-red-500 px-6">Role kamu tidak punya akses ke halaman ini.</div>

  <div id="pageContent" class="hidden">
    <!-- Tabs -->
    <div class="flex gap-2 mb-5">
      <button id="tabInputBtn" class="tab-btn active flex-1 py-2.5 rounded-xl text-sm font-semibold border border-slate-200 dark:border-slate-700">📋 Input Absen</button>
      <button id="tabRekapBtn" class="tab-btn flex-1 py-2.5 rounded-xl text-sm font-semibold border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/60">📊 Rekap Bulanan</button>
    </div>

    <!-- ===== TAB INPUT ===== -->
    <div id="panelInput" class="fade-in">
      <div class="flex flex-wrap gap-2 mb-4">
        <input id="tanggalAbsen" type="date" class="px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/60 text-sm">
        <select id="halaqohSelect" class="flex-1 min-w-[140px] px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/60 text-sm">
          <option value="">Pilih Halaqoh</option>
        </select>
      </div>

      <div id="loadingInput" class="text-center py-10 text-sm text-slate-400">Memuat daftar santri...</div>
      <div id="errorInput" class="hidden text-center py-10 text-red-500 text-sm px-6"></div>

      <div class="bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 rounded-2xl overflow-hidden mb-4" id="tableWrap" style="display:none;">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-xs text-slate-400 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40">
                <th class="py-2.5 px-3 font-semibold">No</th>
                <th class="py-2.5 px-3 font-semibold">Nama Santri</th>
                <th class="py-2.5 px-2 font-semibold text-center">Hadir</th>
                <th class="py-2.5 px-2 font-semibold text-center">Sakit</th>
                <th class="py-2.5 px-2 font-semibold text-center">Izin</th>
                <th class="py-2.5 px-2 font-semibold text-center">Alpha</th>
                <th class="py-2.5 px-3 font-semibold">Catatan</th>
              </tr>
            </thead>
            <tbody id="absenTableBody"></tbody>
          </table>
        </div>
      </div>

      <button id="btnSimpanAbsen" class="w-full py-3.5 rounded-xl bg-hijau text-white font-semibold shadow-lg shadow-hijau/25 disabled:opacity-60">
        Simpan Absen
      </button>
    </div>

    <!-- ===== TAB REKAP BULANAN ===== -->
    <div id="panelRekap" class="hidden fade-in">
      <div class="flex flex-wrap gap-2 mb-4">
        <input id="rekapBulan" type="month" class="px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/60 text-sm">
        <select id="rekapHalaqoh" class="flex-1 min-w-[140px] px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/60 text-sm">
          <option value="">Pilih Halaqoh</option>
        </select>
        <button id="btnMuatRekap" class="px-4 py-2.5 rounded-xl bg-hijau text-white font-semibold text-sm">Tampilkan</button>
      </div>

      <div class="bg-white dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 rounded-2xl p-4">
        <div class="overflow-x-auto">
          <table class="w-full text-xs">
            <thead>
              <tr class="text-left text-slate-400 border-b border-slate-100 dark:border-slate-700">
                <th class="py-2 px-2">Nama</th>
                <th class="py-2 px-2 text-center">Hadir</th>
                <th class="py-2 px-2 text-center">Sakit</th>
                <th class="py-2 px-2 text-center">Izin</th>
                <th class="py-2 px-2 text-center">Alpha</th>
                <th class="py-2 px-2 text-center">% Kehadiran</th>
              </tr>
            </thead>
            <tbody id="rekapBulananBody"></tbody>
          </table>
        </div>
        <div id="rekapBulananEmpty" class="hidden text-center text-xs text-slate-400 py-8">Belum ada data di bulan ini.</div>
      </div>
    </div>
  </div>

</main>

<div id="toast" class="hidden toast fixed bottom-6 left-1/2 -translate-x-1/2 bg-hijau text-white text-sm font-semibold px-5 py-3 rounded-xl shadow-lg z-50"></div>

<script>
/* ====== KONFIGURASI ====== */
const API_URL = 'https://script.google.com/macros/s/AKfycbw3bi_-pKcsAlxhMgeqFuTVUKkpe3hNmN4urGs5pirGfAAtTdUFCyvbKRm-9x-Z0h7g5A/exec';
const STATUS_LIST = ['Hadir', 'Sakit', 'Izin', 'Alpha'];

/* ====== AUTH GUARD + KONTROL AKSES ROLE ====== */ //FITUR BARU
const rawUser = sessionStorage.getItem('pondok_user');
if(!rawUser) window.location.href = 'login.html';
const currentUser = rawUser ? JSON.parse(rawUser) : null;
const ALLOWED_ROLES = ['Ustadz', 'Admin', 'SuperAdmin']; //FITUR BARU

if(currentUser && !ALLOWED_ROLES.includes(currentUser.role)){
  document.getElementById('accessDenied').classList.remove('hidden');
} else {
  document.getElementById('pageContent').classList.remove('hidden');
}

/* ====== DARK MODE ====== */
const darkToggle = document.getElementById('darkToggle');
function applyDarkMode(on){
  document.documentElement.classList.toggle('dark', on);
  darkToggle.textContent = on ? '☀️' : '🌙';
  localStorage.setItem('pondok_dark', on ? '1' : '0');
}
applyDarkMode(localStorage.getItem('pondok_dark') !== '0');
darkToggle.addEventListener('click', () => applyDarkMode(!document.documentElement.classList.contains('dark')));

/* ====== TOAST ====== */
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.add('hidden'), 2500);
}

/* ====== TAB SWITCH ====== */
const tabInputBtn = document.getElementById('tabInputBtn');
const tabRekapBtn = document.getElementById('tabRekapBtn');
tabInputBtn.addEventListener('click', () => switchTab('input'));
tabRekapBtn.addEventListener('click', () => switchTab('rekap'));
function switchTab(tab){
  document.getElementById('panelInput').classList.toggle('hidden', tab !== 'input');
  document.getElementById('panelRekap').classList.toggle('hidden', tab !== 'rekap');
  tabInputBtn.classList.toggle('active', tab === 'input');
  tabRekapBtn.classList.toggle('active', tab === 'rekap');
}

/* ====== API HELPER ====== */
async function callApi(payload){
  const res = await fetch(API_URL, {
    method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload)
  });
  return res.json();
}

/* ====== STATE ====== */
let santriList = [];
let entries = {}; // { id_santri: { status, catatan } }

/* ====== INIT TANGGAL / HALAQOH SELECT ====== */
document.getElementById('tanggalAbsen').value = new Date().toISOString().slice(0,10);
document.getElementById('rekapBulan').value = new Date().toISOString().slice(0,7);

function setupHalaqohLock(selectEl){
  //FITUR BARU — Ustadz otomatis dikunci ke halaqoh-nya sendiri, Admin/SuperAdmin bebas pilih
  if(currentUser.role === 'Ustadz'){
    selectEl.innerHTML = `<option value="${currentUser.halaqoh}">${currentUser.halaqoh}</option>`;
    selectEl.value = currentUser.halaqoh;
    selectEl.disabled = true;
  }
}
setupHalaqohLock(document.getElementById('halaqohSelect'));
setupHalaqohLock(document.getElementById('rekapHalaqoh'));

//FITUR BARU — Admin/SuperAdmin: isi pilihan halaqoh dari data santri yang ada
async function populateHalaqohOptionsIfNeeded(){
  if(currentUser.role === 'Ustadz') return;
  try{
    const result = await callApi({ action: 'getData', role: currentUser.role });
    if(!result.ok) return;
    const halaqohSet = [...new Set((result.data || []).map(s => s.halaqoh).filter(Boolean))].sort();
    ['halaqohSelect','rekapHalaqoh'].forEach(id => {
      const sel = document.getElementById(id);
      halaqohSet.forEach(h => sel.insertAdjacentHTML('beforeend', `<option value="${h}">${h}</option>`));
    });
  } catch(err){ /* biarkan user pilih manual kalau gagal */ }
}
populateHalaqohOptionsIfNeeded();

/* ====== LOAD SANTRI + ABSEN HARI ITU ====== */
document.getElementById('halaqohSelect').addEventListener('change', loadAbsenTable);
document.getElementById('tanggalAbsen').addEventListener('change', loadAbsenTable);

async function loadAbsenTable(){
  const halaqoh = document.getElementById('halaqohSelect').value;
  const tanggal = document.getElementById('tanggalAbsen').value;
  const wrap = document.getElementById('tableWrap');
  const loading = document.getElementById('loadingInput');
  const errorEl = document.getElementById('errorInput');

  if(!halaqoh){ wrap.style.display = 'none'; return; }

  loading.classList.remove('hidden');
  errorEl.classList.add('hidden');
  wrap.style.display = 'none';

  try{
    const [dataRes, absenRes] = await Promise.all([
      callApi({ action: 'getData', role: currentUser.role, halaqoh }),
      callApi({ action: 'getAbsen', role: currentUser.role, halaqoh, tanggal })
    ]);
    if(!dataRes.ok) throw new Error(dataRes.error || 'Gagal memuat santri');
    if(!absenRes.ok) throw new Error(absenRes.error || 'Gagal memuat absen');

    santriList = dataRes.data || [];
    entries = {};
    (absenRes.data || []).forEach(r => { entries[r.id_santri] = { status: r.status, catatan: r.catatan || '' }; });

    renderAbsenTable();
    wrap.style.display = 'block';
  } catch(err){
    errorEl.textContent = err.message;
    errorEl.classList.remove('hidden');
  } finally {
    loading.classList.add('hidden');
  }
}

function renderAbsenTable(){
  const body = document.getElementById('absenTableBody');
  if(!santriList.length){
    body.innerHTML = `<tr><td colspan="7" class="text-center text-xs text-slate-400 py-6">Tidak ada santri di halaqoh ini.</td></tr>`;
    return;
  }
  body.innerHTML = santriList.map((s, idx) => {
    const current = entries[s.id] || {};
    return `
      <tr class="border-b border-slate-50 dark:border-slate-800" data-id="${escapeAttr(s.id)}">
        <td class="py-2.5 px-3 text-xs text-slate-400">${idx + 1}</td>
        <td class="py-2.5 px-3 font-medium">${escapeHtml(s.nama || '-')}</td>
        ${STATUS_LIST.map(st => `
          <td class="py-2.5 px-2 text-center">
            <input type="radio" name="status_${escapeAttr(s.id)}" value="${st}" ${current.status === st ? 'checked' : ''}>
          </td>
        `).join('')}
        <td class="py-2.5 px-3">
          <input type="text" class="catatan-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-xs" placeholder="Catatan..." value="${escapeAttr(current.catatan || '')}">
        </td>
      </tr>
    `;
  }).join('');
}

/* ====== SIMPAN ABSEN ====== */
document.getElementById('btnSimpanAbsen').addEventListener('click', async () => {
  const halaqoh = document.getElementById('halaqohSelect').value;
  const tanggal = document.getElementById('tanggalAbsen').value;
  if(!halaqoh){ showToast('Pilih halaqoh dulu.'); return; }

  const rows = Array.from(document.querySelectorAll('#absenTableBody tr[data-id]'));
  const toSave = [];
  rows.forEach(row => {
    const id = row.dataset.id;
    const checked = row.querySelector('input[type="radio"]:checked');
    const catatan = row.querySelector('.catatan-input').value;
    if(checked) toSave.push({ id_santri: id, status: checked.value, catatan });
  });

  if(!toSave.length){ showToast('Belum ada status yang dipilih.'); return; }

  const btn = document.getElementById('btnSimpanAbsen');
  btn.disabled = true; btn.textContent = `Menyimpan 0/${toSave.length}...`;
  let sukses = 0;
  for(const item of toSave){
    try{
      const result = await callApi({
        action: 'saveAbsen', id_santri: item.id_santri, status: item.status, catatan: item.catatan,
        tanggal, halaqoh, role: currentUser.role, username: currentUser.username
      });
      if(result.ok) sukses++;
    } catch(err){ /* lanjut ke santri berikutnya */ }
    btn.textContent = `Menyimpan ${sukses}/${toSave.length}...`;
  }
  btn.disabled = false; btn.textContent = 'Simpan Absen';
  showToast(`✓ Berhasil Disimpan (${sukses}/${toSave.length})`); //FITUR BARU notifikasi
});

/* ====== REKAP BULANAN ====== */
document.getElementById('btnMuatRekap').addEventListener('click', loadRekapBulanan);

async function loadRekapBulanan(){
  const halaqoh = document.getElementById('rekapHalaqoh').value;
  const bulan = document.getElementById('rekapBulan').value; // format yyyy-MM
  if(!halaqoh || !bulan){ showToast('Pilih halaqoh dan bulan dulu.'); return; }

  const mulai = bulan + '-01';
  const [year, month] = bulan.split('-').map(Number);
  const lastDay = new Date(year, month, 0).getDate();
  const selesai = `${bulan}-${String(lastDay).padStart(2,'0')}`;

  try{
    const [dataRes, absenRes] = await Promise.all([
      callApi({ action: 'getData', role: currentUser.role, halaqoh }),
      callApi({ action: 'getAbsen', role: currentUser.role, halaqoh, mulai, selesai })
    ]);
    if(!dataRes.ok) throw new Error(dataRes.error);
    if(!absenRes.ok) throw new Error(absenRes.error);
    renderRekapBulanan(dataRes.data || [], absenRes.data || []);
  } catch(err){
    showToast('Gagal memuat rekap: ' + err.message);
  }
}

function renderRekapBulanan(santri, absenRows){
  const body = document.getElementById('rekapBulananBody');
  const empty = document.getElementById('rekapBulananEmpty');
  if(!santri.length){ body.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');

  body.innerHTML = santri.map(s => {
    const rows = absenRows.filter(r => String(r.id_santri) === String(s.id));
    const count = { Hadir:0, Sakit:0, Izin:0, Alpha:0 };
    rows.forEach(r => { if(count[r.status] !== undefined) count[r.status]++; });
    const total = rows.length;
    const persenHadir = total ? Math.round((count.Hadir / total) * 100) : 0;
    return `
      <tr class="border-b border-slate-50 dark:border-slate-800">
        <td class="py-2 px-2 font-medium">${escapeHtml(s.nama || '-')}</td>
        <td class="py-2 px-2 text-center">${count.Hadir}</td>
        <td class="py-2 px-2 text-center">${count.Sakit}</td>
        <td class="py-2 px-2 text-center">${count.Izin}</td>
        <td class="py-2 px-2 text-center">${count.Alpha}</td>
        <td class="py-2 px-2 text-center font-semibold ${persenHadir < 70 ? 'text-red-500' : 'text-hijau'}">${persenHadir}%</td>
      </tr>
    `;
  }).join('');
}

/* ====== UTIL ====== */
function escapeHtml(str){ return String(str).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(str){ return escapeHtml(str); }
</script>
</body>
</html>
